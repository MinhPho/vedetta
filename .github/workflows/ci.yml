name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: golangci/golangci-lint-action@v6
        with:
          args: --timeout=5m
          skip-cache: true

      - run: make check

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: make build

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [check, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/rvben/watchpost:${{ github.ref_name }}
            ghcr.io/rvben/watchpost:latest

      - name: Build release binaries
        run: |
          GOOS=linux GOARCH=amd64 go build -o watchpost-linux-amd64 ./cmd/watchpost
          GOOS=linux GOARCH=arm64 go build -o watchpost-linux-arm64 ./cmd/watchpost

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            watchpost-linux-amd64
            watchpost-linux-arm64
          generate_release_notes: true

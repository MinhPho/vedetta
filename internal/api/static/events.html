<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Events - Watchpost</title>
  <link rel="stylesheet" href="/style.css">
  <script src="https://unpkg.com/htmx.org@2.0.4" integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+" crossorigin="anonymous"></script>
  <meta name="theme-color" content="#0a0e14">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/favicon.svg">
</head>
<body>

  <nav class="topnav" role="navigation" aria-label="Main">
    <a href="/" class="topnav-brand" aria-label="Watchpost home">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></svg>
      <span>watchpost</span>
    </a>
    <div class="topnav-links">
      <a href="/" class="topnav-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Cameras</a>
      <a href="/events.html" class="topnav-link active" aria-current="page"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="10"/></svg>Events</a>
      <a href="/recordings.html" class="topnav-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>Recordings</a>
      <a href="/system.html" class="topnav-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>System</a>
    </div>
    <button class="btn btn-icon btn-ghost" onclick="toggleTheme()" aria-label="Toggle theme" title="Toggle dark/light theme" id="theme-toggle">
      <svg id="theme-icon-dark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg id="theme-icon-light" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16" style="display:none"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </button>
    <div class="topnav-spacer"></div>
    <div class="conn-status"><span class="conn-dot ok" id="conn-dot"></span><span id="conn-label">Connected</span></div>
  </nav>

  <main class="page">
    <div class="page-header">
      <h1>Events</h1>
    </div>

    <!-- Label Filter Chips -->
    <div class="chip-bar" id="filter-chips" role="toolbar" aria-label="Event filters">
      <button class="chip active" data-filter="label" data-value="" onclick="toggleChip(this, 'label')">All</button>
      <button class="chip" data-filter="label" data-value="person" onclick="toggleChip(this, 'label')">
        <span class="chip-dot person"></span>Person
      </button>
      <button class="chip" data-filter="label" data-value="car" onclick="toggleChip(this, 'label')">
        <span class="chip-dot car"></span>Car
      </button>
      <button class="chip" data-filter="label" data-value="dog" onclick="toggleChip(this, 'label')">
        <span class="chip-dot dog"></span>Dog
      </button>
      <button class="chip" data-filter="label" data-value="cat" onclick="toggleChip(this, 'label')">
        <span class="chip-dot cat"></span>Cat
      </button>
    </div>

    <!-- Camera Filter Chips -->
    <div class="chip-bar" id="camera-chips" role="toolbar" aria-label="Camera filters">
      <button class="chip active" data-filter="camera" data-value="" onclick="toggleChip(this, 'camera')">All Cameras</button>
    </div>

    <!-- Event Gallery -->
    <div class="event-gallery"
         id="events-gallery"
         hx-get="/partials/events-gallery"
         hx-trigger="load"
         hx-swap="innerHTML"
         role="list"
         aria-label="Detection events">
      <div class="loading-state">Loading events...</div>
    </div>

  </main>

  <nav class="bottom-tabs" role="navigation" aria-label="Mobile navigation">
    <div class="bottom-tabs-inner">
      <a href="/" class="bottom-tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Cameras</a>
      <a href="/events.html" class="bottom-tab active" aria-current="page"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="10"/></svg>Events</a>
      <a href="/recordings.html" class="bottom-tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>Recordings</a>
      <a href="/system.html" class="bottom-tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>System</a>
    </div>
  </nav>

  <div class="toast-container" id="toasts"></div>
  <script src="/app.js"></script>
  <script>
    // Populate camera chips from API and fetch event counts
    Promise.all([
      fetch('/api/cameras').then(r => r.json()),
      fetch('/api/events/counts').then(r => r.json())
    ]).then(function([camData, counts]) {
      var byLabel = counts.by_label || {};
      var byCamera = counts.by_camera || {};
      var total = counts.total || 0;

      // Update label chip counts
      var allChip = document.querySelector('.chip[data-filter="label"][data-value=""]');
      if (allChip && total > 0) {
        allChip.innerHTML = 'All <span class="count">' + total + '</span>';
      }
      document.querySelectorAll('.chip[data-filter="label"]').forEach(function(chip) {
        var val = chip.dataset.value;
        if (val && byLabel[val]) {
          var dot = chip.querySelector('.chip-dot');
          var dotHTML = dot ? dot.outerHTML : '';
          var label = val.charAt(0).toUpperCase() + val.slice(1);
          chip.innerHTML = dotHTML + label + ' <span class="count">' + byLabel[val] + '</span>';
        }
      });

      // Create camera chips with counts
      var bar = document.getElementById('camera-chips');
      var allCamChip = document.querySelector('.chip[data-filter="camera"][data-value=""]');
      if (allCamChip && total > 0) {
        allCamChip.innerHTML = 'All Cameras <span class="count">' + total + '</span>';
      }
      (camData.cameras || []).forEach(function(name) {
        var btn = document.createElement('button');
        btn.className = 'chip';
        btn.dataset.filter = 'camera';
        btn.dataset.value = name;
        var displayName = name.replace(/_/g, ' ');
        var countHTML = byCamera[name] ? ' <span class="count">' + byCamera[name] + '</span>' : '';
        btn.innerHTML = displayName + countHTML;
        btn.onclick = function() { toggleChip(this, 'camera'); };
        bar.appendChild(btn);
      });
    });
  </script>
</body>
</html>
